name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  shellcheck:
    name: Shell Linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          format: gcc
          severity: error
          ignore_paths: ".github"

  test:
    name: Basic Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test help output
        run: |
          ./deva.sh --help
          ./claude-yolo --help

      - name: Test version output
        run: |
          ./deva.sh --version
          ./claude-yolo --version

      - name: Check version consistency
        run: |
          chmod +x scripts/version-check.sh
          ./scripts/version-check.sh

  smoke:
    name: Installer Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install and launch each agent without a TTY
        shell: bash
        run: |
          set -euo pipefail
          export HOME="$(mktemp -d)"
          export PATH="$HOME/.local/bin:$PATH"
          export DEVA_INSTALL_BASE_URL="file://$PWD"
          export DEVA_NO_DOCKER=1

          bash ./install.sh

          deva.sh claude -Q -- --version
          deva.sh codex -Q -- --version
          deva.sh gemini -Q -- --version

  docs:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install MkDocs
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs-requirements.txt

      - name: Build docs
        run: mkdocs build --strict
